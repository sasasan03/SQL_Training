services:
  db:
    build: ./infra/mysql
    container_name: db-container
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=phper
      - MYSQL_PASSWORD=password
      - TZ=Asia/Tokyo
    ports:
      - "3306:3306"

  app:
    build: ./infra/php
    container_name: app-container
    volumes:
      - ./infra/php/php.ini:/usr/local/etc/php/php.ini
      - ./src:/var/www
    ports:
      - "8080:80"
    expose:
      - 9003
    depends_on:
      - db
volumes:
  db-data:
